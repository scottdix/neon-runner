    GOTCHA LEARNED THIS SESSION: a Node add_child()ed during a verify script's _initialize() has its _ready
    DEFERRED under `-s` (same as autoloads) — pump `await process_frame` before asserting on the built tree
    (see verify_gamefeel.gd). And a bare `Events` identifier won't compile in the `-s` MAIN tool script
    (autoload globals not registered yet at its compile time) — use the root.get_node_or_null("Events") ref;
    Palette.CONST works because it's const resolution.
