    (idempotent; verify scripts call it since autoload _ready is deferred under headless -s). (2) #53
    ARCHETYPES: Glitch / Looming Rhombus (armored) / Fractal (splits below the firepower tier) /
    Fractling. (3) #54 BATCHED COLLISION (D3): Fleet.consume_volumes — all enemy volumes vs bullets in
    ONE pass + x-band cull; consume_near delegates to it. (4) #14 SCALE assertion holds bullets bounded.
    (5) COMBAT LOOP CLOSED: enemies breaching the ship line drain the Glow Battery (Events.enemy_breached).
    (6) COMBO: kills route through GameState.register_kill (wires dormant combo/multiplier signals),
    decays via _tick_combo. (7) REVIEW FIX: per-iteration run_active guard stops a phantom kill after a
    battery-failing breach. New Events: enemy_breached, enemy_split.

