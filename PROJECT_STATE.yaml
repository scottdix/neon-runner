    Folded Scott's rulings into docs/design/DESIGN_SPEC.md (now "second art direction pass"):
    (1) NAME = Neon Splice (rejected "Splicer"; kept the "splice" verb + "Entropy faction").
    (2) ADOPTED the brighter palette — ship #00f3ff, enemies hot-rose #ff007f (NEW role), add-gate
    acid #39ff14, grid blue #1a1aff, hazard #ff3333; kept 3 distinct gate colors (green +/magenta
    x/red ÷), studio's positive/negative collapse = documented fallback (magenta freed since enemies
    moved to rose). (3) NEW SECTIONS: Entropy faction (archetype -> mobile render strategy:
    particles/sprite+shader/baked-UV/parallax), Reactive vector grid, Platform feel (HAPTICS + AMOLED
    both IN SCOPE for v0.2.0). (4) REJECTED as artifact noise: landscape 2400x1080 (locked portrait
    1080x1920), GLES (we use Mobile/Vulkan), AI-gen shader snippets (validate on device). style-guide/
    now committed as reference (5.9M). #53 NOT started (still current). TWO NEW ISSUES PENDING: Haptics
    + AMOLED mode (not yet filed). Updated memory design-directions-artifact.
  previous_notes: >
    Session 10. #13 SEGMENT-DRIVEN SPAWNER — all headless-validated (verify_run + verify_combat +
    verify_scene + new verify_spawner all PASS) + code-reviewed (high, no bugs shipped, 2 robustness
    fixes). The level owns ONE authored schedule: LevelDef.gate_formations + enemy_waves (STRING
    ops/kinds so the resource needs no Gate/Targets dependency), streamed by TWO decoupled consumers
    (no fat director node; Run wires both after start_run). (1) GateSpawner.build_formations(specs)
    reads the level's formations via new Gate.op_from_string + RECYCLES (frees) formations scrolled
    past the ship line. (2) Targets is now WAVE-DRIVEN + FINITE: waves spawn by track_m at WORLD-X
    (spread across the playfield, NOT lanes) and killed/breached/offscreen enemies are REMOVED (the
    endless respawn is gone); set_schedule duplicates each wave dict so the shared LevelDef array
    never gets a spawned flag. (3) New verify_spawner.gd (op-map, build, recycle fires-once-then-freed,
    waves spawn at the mark + world-x spread, finite removal); other verifiers updated for the finite
    semantics. (4) REVIEW FIXES: a wave defers (never silently lost) if the field is full; gate recycle
    no longer depends on `triggered`. First wave @18m; 7 waves escalate to a dense mixed close.
    NOT device-validated (glow/FPS need a phone — #54 acceptance #2 still open).

